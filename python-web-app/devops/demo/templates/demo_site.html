<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kubernetes Service Demo</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:50px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:400px;
}

h1{
    color:#1e3a8a;
    margin-bottom:10px;
}

h2{
    color:#2563eb;
    margin-top:0;
}

p{
    color:#444;
    font-size:18px;
}

.badge{
    margin-top:20px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border-radius:20px;
    display:inline-block;
    font-weight:bold;
}

footer{
    margin-top:30px;
    font-size:14px;
    color:#777;
}

</style>
</head>

<body>

<div class="card">

<h1>Kubernetes Service</h1>
<h2>Application Exposed Successfully</h2>

<p>
This application is running inside a Kubernetes Pod and exposed using a Service.
</p>

<div class="badge">
Created by Praveen 🚀
</div>

<footer>
Kubernetes Networking Demo
</footer>

</div>

</body>
</html>
